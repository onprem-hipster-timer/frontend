name: Update API Client from Backend OpenAPI Specification

on:
  repository_dispatch:
    types: [backend_released]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-api-client:
    runs-on: ubuntu-latest
    env:
      BACKEND_TAG: ${{ github.event.client_payload.tag }}

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: onprem-hipster-timer/backend
          path: backend
          token: ${{ secrets.BACKEND_REPO_TOKEN || github.token }}

      - name: Sanitize tag for branch name
        id: sanitize_tag
        shell: bash
        run: |
          set -euo pipefail
          SAFE_TAG="${BACKEND_TAG}"
          SAFE_TAG="${SAFE_TAG//\//-}"
          SAFE_TAG="${SAFE_TAG// /-}"
          SAFE_TAG="${SAFE_TAG//:/-}"
          if [ -z "${SAFE_TAG}" ]; then
            SAFE_TAG="unknown-tag"
          fi
          echo "safe_tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          cd backend

          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install --upgrade pip
            pip install .
          else
            echo "No requirements.txt or pyproject.toml found in backend repository."
            exit 1
          fi

      - name: Run backend and fetch OpenAPI spec
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lib/openapi

          cd backend
          uvicorn main:app --host 127.0.0.1 --port 8000 > ../backend_server.log 2>&1 &
          BACKEND_PID=$!
          echo "Started backend server with PID ${BACKEND_PID}"

          for i in {1..20}; do
            if curl -sSf http://127.0.0.1:8000/openapi.json > /dev/null; then
              echo "Backend server is ready."
              break
            fi
            echo "Waiting for backend server... (${i}/20)"
            sleep 2
          done

          curl -sSf http://127.0.0.1:8000/openapi.json > ../frontend/lib/openapi/openapi.json
          kill "${BACKEND_PID}" || true

      - name: Format OpenAPI JSON
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          openapi_path = Path("frontend/lib/openapi/openapi.json")
          data = json.loads(openapi_path.read_text(encoding="utf-8"))
          openapi_path.write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dart/Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Run Swagger Parser
        working-directory: frontend
        run: dart run swagger_parser

      - name: Run Build Runner
        working-directory: frontend
        run: dart run build_runner build -d

      - name: Format Dart code
        working-directory: frontend
        run: dart format .

      - name: Remove temporary backend file and move frontend files to root
        run: |
          rm -rf backend
          mv frontend/* .

      - name: Build PR body from template
        id: build_pr_body
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE="$(mktemp)"

          cat .github/PULL_REQUEST_TEMPLATE.md > "${BODY_FILE}"

          cat <<EOF >> "${BODY_FILE}"

          ## 자동 업데이트 정보

          ### [업데이트 요약]
          - 백엔드 버전 \`${BACKEND_TAG}\` 배포에 따른 OpenAPI 명세서 동기화

          ### [자동화 작업 내역]
          - openapi.json 갱신 및 포맷팅 완료
          - swagger_parser 실행 완료
          - build_runner 실행 완료
          - dart format 적용 완료
          EOF

          echo "pr_body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(api): update OpenAPI and generated Dart client (tag: ${{ env.BACKEND_TAG }})"
          title: "[Feat] 백엔드 API 업데이트 반영 (Tag: ${{ env.BACKEND_TAG }})"
          body-path: ${{ steps.build_pr_body.outputs.pr_body_file }}
          branch: "chore/update-api-client-${{ steps.sanitize_tag.outputs.safe_tag }}"
          delete-branch: true
          reviewers: gunyu1019
